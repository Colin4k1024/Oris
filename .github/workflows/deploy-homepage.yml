name: Deploy Docs Site

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'README.md'
      - 'crates/oris-experience-repo/Cargo.toml'
      - '.github/workflows/deploy-homepage.yml'
      - '.github/scripts/gen_docs_site.py'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' crates/oris-experience-repo/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Collect docs
        run: |
          mkdir -p _site/docs
          [ -f README.md ] && cp README.md _site/docs/_README.md
          find docs -name "*.md" | while IFS= read -r f; do
            rel="${f#docs/}"
            mkdir -p "_site/docs/$(dirname "$rel")"
            cp "$f" "_site/docs/$rel"
          done

      - name: Generate documentation site
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: python3 .github/scripts/gen_docs_site.py

      - name: Setup Pages
        uses: actions/configure-pages@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
