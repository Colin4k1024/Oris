name: Publish oris-experience-repo

on:
  push:
    tags:
      - 'experience-repo/v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          profile: minimal

      - name: Dry-run publish
        uses: actions-rs/cargo@v1
        with:
          command: publish
          args: -p oris-experience-repo --dry-run --registry crates-io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}

      - name: Publish to crates.io
        if: github.event_name == 'push'
        uses: actions-rs/cargo@v1
        with:
          command: publish
          args: -p oris-experience-repo --registry crates-io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
